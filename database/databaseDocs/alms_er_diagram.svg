<svg viewBox="0 0 1500 1180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="dotgrid" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1.1" fill="#202b46" opacity="0.55"/>
  </pattern>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.4"/>
  </filter>
  <linearGradient id="gUsers" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#4c8bf5"/><stop offset="1" stop-color="#1d4fc4"/>
  </linearGradient>
  <linearGradient id="gBooks" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#22c08f"/><stop offset="1" stop-color="#04875e"/>
  </linearGradient>
  <linearGradient id="gBorrow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fb9a4b"/><stop offset="1" stop-color="#c2540c"/>
  </linearGradient>
  <linearGradient id="gFines" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f4685f"/><stop offset="1" stop-color="#b91c2c"/>
  </linearGradient>
  <clipPath id="cUsers"><rect x="50" y="100" width="300" height="244" rx="10"/></clipPath>
  <clipPath id="cBooks"><rect x="1110" y="100" width="300" height="296" rx="10"/></clipPath>
  <clipPath id="cBorrow"><rect x="560" y="460" width="340" height="322" rx="10"/></clipPath>
  <clipPath id="cFines"><rect x="560" y="860" width="320" height="218" rx="10"/></clipPath>
  <style>
    text{font-family:'Segoe UI',Arial,sans-serif;}
    .maintitle{font-size:25px;font-weight:700;fill:#f4f6fb;}
    .subtitle{font-size:12.5px;fill:#8a93b3;}
    .tname{font-size:14.5px;font-weight:700;fill:#ffffff;letter-spacing:.4px;}
    .tcount{font-size:9px;fill:rgba(255,255,255,.78);}
    .rname{font-size:12.2px;fill:#d8dfee;}
    .rtype{font-size:9.8px;fill:#7c87a8;font-family:Consolas,Monaco,monospace;}
    .bdg{font-size:7.5px;font-weight:700;font-family:Consolas,Monaco,monospace;}
    .div{stroke:#2a3450;stroke-width:1;opacity:.7;}
    .ntitle{font-size:11.5px;font-weight:700;letter-spacing:.6px;}
    .nname{font-size:10.3px;font-weight:700;fill:#d8dfee;font-family:Consolas,Monaco,monospace;}
    .ndesc{font-size:9.2px;fill:#8b96b3;}
    .rlabel{font-size:8.8px;font-weight:700;font-family:Consolas,Monaco,monospace;}
    .legend{font-size:10.5px;fill:#9aa4c0;}
    .footer{font-size:10px;fill:#525c78;}
  </style>
</defs>

<rect x="0" y="0" width="1500" height="1180" fill="#0c111f"/>
<rect x="0" y="0" width="1500" height="1180" fill="url(#dotgrid)"/>

